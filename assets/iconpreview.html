<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAWN — Icon Preview</title>
<style>
  :root {
    --navy: #0a0e1a;
    --navy2: #1a2040;
    --coral: #ff7b4f;
    --amber: #ffb347;
    --gold: #ffd700;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #2b2f38;
    color: #e7e9ee;
  }
  header {
    padding: 40px 48px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  header h1 {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    letter-spacing: 10px;
    font-size: 40px;
    background: linear-gradient(180deg, #fff6d8, var(--amber));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p { margin: 8px 0 0; opacity: 0.65; font-size: 14px; }

  .toolbar {
    display: flex; gap: 12px; align-items: center;
    padding: 16px 48px;
    position: sticky; top: 0; z-index: 5;
    background: rgba(43,47,56,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .toolbar button {
    cursor: pointer; border: 1px solid rgba(255,255,255,0.18);
    background: transparent; color: #e7e9ee;
    padding: 8px 16px; border-radius: 999px; font-size: 13px;
    transition: all .15s ease;
  }
  .toolbar button.active { background: #fff; color: #111; border-color: #fff; }

  main { padding: 32px 48px 80px; }

  .group { margin-bottom: 56px; }
  .group > h2 {
    font-size: 18px; font-weight: 600; margin: 0 0 4px;
  }
  .group > .file { font-size: 12px; opacity: 0.5; margin: 0 0 20px; font-family: ui-monospace, Menlo, monospace; }

  .sizes {
    display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-end;
  }
  .swatch { text-align: center; }
  .swatch .frame {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 22%;
    overflow: hidden;
  }
  .swatch .frame.mono { background: #444b58; }
  .swatch img { display: block; }
  .swatch .label { margin-top: 8px; font-size: 12px; opacity: 0.6; }

  /* Background theme toggle */
  body.light { background: #f1f2f5; color: #1c1e24; }
  body.light .toolbar { background: rgba(241,242,245,0.92); border-color: rgba(0,0,0,0.08); }
  body.light .toolbar button { color: #1c1e24; border-color: rgba(0,0,0,0.2); }
  body.light .toolbar button.active { background: #111; color: #fff; border-color: #111; }
  body.light header { border-color: rgba(0,0,0,0.08); }
  body.light .swatch .frame.mono { background: #cfd3db; }

  .feature-wrap { max-width: 1024px; }
  .feature-wrap img { width: 100%; height: auto; border-radius: 12px; display: block; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

  .note { font-size: 12px; opacity: 0.5; margin-top: 10px; }
</style>
</head>
<body>
  <header>
    <h1>DAWN</h1>
    <p>App icon design preview — 夜の自分が朝の自分に送る約束</p>
  </header>

  <div class="toolbar">
    <span style="opacity:.6;font-size:13px;margin-right:4px;">Preview background:</span>
    <button id="btnDark" class="active" onclick="setTheme('dark')">Dark</button>
    <button id="btnLight" onclick="setTheme('light')">Light</button>
  </div>

  <main>
    <section class="group">
      <h2>Primary Icon</h2>
      <p class="file">assets/icon-primary.svg</p>
      <div class="sizes" data-src="icon-primary.svg"></div>
    </section>

    <section class="group">
      <h2>Alternative Icon</h2>
      <p class="file">assets/icon-alt.svg</p>
      <div class="sizes" data-src="icon-alt.svg"></div>
    </section>

    <section class="group">
      <h2>Monochrome Icon <span style="opacity:.5;font-weight:400;font-size:13px;">(transparent — shown on a tinted frame)</span></h2>
      <p class="file">assets/icon-monochrome.svg</p>
      <div class="sizes" data-src="icon-monochrome.svg" data-mono="true"></div>
    </section>

    <section class="group">
      <h2>Feature Graphic <span style="opacity:.5;font-weight:400;font-size:13px;">(1024×500)</span></h2>
      <p class="file">assets/feature-graphic.svg</p>
      <div class="feature-wrap">
        <img src="feature-graphic.svg" alt="DAWN feature graphic">
      </div>
    </section>
  </main>

  <script>
    const SIZES = [1024, 180, 120, 60, 40];
    document.querySelectorAll('.sizes').forEach(row => {
      const src = row.dataset.src;
      const mono = row.dataset.mono === 'true';
      SIZES.forEach(sz => {
        const display = Math.min(sz, 256); // cap the 1024 render so the page stays usable
        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.innerHTML = `
          <div class="frame ${mono ? 'mono' : ''}" style="width:${display}px;height:${display}px;">
            <img src="${src}" width="${display}" height="${display}" alt="">
          </div>
          <div class="label">${sz}px${sz > display ? ` (shown @${display})` : ''}</div>`;
        row.appendChild(sw);
      });
    });

    function setTheme(t) {
      document.body.classList.toggle('light', t === 'light');
      document.getElementById('btnDark').classList.toggle('active', t === 'dark');
      document.getElementById('btnLight').classList.toggle('active', t === 'light');
    }
  </script>
</body>
</html>
