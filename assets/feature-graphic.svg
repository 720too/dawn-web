<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500" role="img" aria-label="DAWN feature graphic">
  <defs>
    <linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0e1a"/>
      <stop offset="45%" stop-color="#141a33"/>
      <stop offset="78%" stop-color="#3a2a4a"/>
      <stop offset="100%" stop-color="#5a3550"/>
    </linearGradient>
    <radialGradient id="fglow" cx="78%" cy="118%" r="70%">
      <stop offset="0%"   stop-color="#ff7b4f" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#ffb347" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff7b4f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fsun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff6d8"/>
      <stop offset="40%"  stop-color="#ffd700"/>
      <stop offset="75%"  stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b4f"/>
    </radialGradient>
    <linearGradient id="fword" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff6d8"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#fsky)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="90"  r="2.5" opacity="0.8"/>
    <circle cx="220" cy="150" r="1.8" opacity="0.5"/>
    <circle cx="80"  cy="200" r="2"   opacity="0.6"/>
    <circle cx="300" cy="70"  r="2.2" opacity="0.7"/>
    <circle cx="430" cy="120" r="1.6" opacity="0.45"/>
    <circle cx="180" cy="260" r="1.6" opacity="0.4"/>
  </g>

  <!-- Glow + sun on the right -->
  <rect width="1024" height="500" fill="url(#fglow)"/>
  <circle cx="800" cy="500" r="190" fill="url(#fsun)"/>
  <g fill="none" stroke="#ffb347" stroke-linecap="round" opacity="0.55">
    <path d="M 560 500 A 240 240 0 0 1 1040 500" stroke-width="3"/>
    <path d="M 620 500 A 180 180 0 0 1 980 500" stroke-width="3" opacity="0.6"/>
  </g>
  <rect x="0" y="500" width="1024" height="2" fill="#ffb347"/>

  <!-- Wordmark -->
  <text x="90" y="240" font-family="Georgia, 'Times New Roman', serif"
        font-size="92" letter-spacing="22" fill="url(#fword)">DAWN</text>
  <text x="96" y="300" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="26" letter-spacing="2" fill="#e7e9ee" opacity="0.92">夜の自分が、朝の自分に送る約束。</text>
  <text x="96" y="342" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="18" letter-spacing="1" fill="#ffb347" opacity="0.85">A promise from your night-self to your morning-self.</text>
</svg>
