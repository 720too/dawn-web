<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="DAWN app icon">
  <defs>
    <!-- Night-to-dawn sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0e1a"/>
      <stop offset="42%" stop-color="#141a33"/>
      <stop offset="72%" stop-color="#3a2a4a"/>
      <stop offset="100%" stop-color="#5a3550"/>
    </linearGradient>
    <!-- Rising sun core -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff6d8"/>
      <stop offset="35%"  stop-color="#ffd700"/>
      <stop offset="70%"  stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b4f"/>
    </radialGradient>
    <!-- Horizon glow -->
    <radialGradient id="glow" cx="50%" cy="100%" r="75%">
      <stop offset="0%"   stop-color="#ff7b4f" stop-opacity="0.95"/>
      <stop offset="35%"  stop-color="#ffb347" stop-opacity="0.45"/>
      <stop offset="70%"  stop-color="#ff7b4f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff7b4f" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1024" height="1024" fill="url(#sky)"/>

    <!-- Fading stars (night-self) -->
    <g fill="#ffffff">
      <circle cx="190" cy="180" r="4"   opacity="0.85"/>
      <circle cx="300" cy="120" r="2.5" opacity="0.55"/>
      <circle cx="430" cy="210" r="3"   opacity="0.7"/>
      <circle cx="720" cy="150" r="4"   opacity="0.8"/>
      <circle cx="840" cy="240" r="2.5" opacity="0.5"/>
      <circle cx="610" cy="100" r="2"   opacity="0.45"/>
      <circle cx="150" cy="320" r="2.5" opacity="0.5"/>
      <circle cx="880" cy="120" r="3"   opacity="0.65"/>
    </g>

    <!-- Horizon glow halo -->
    <rect x="0" y="360" width="1024" height="664" fill="url(#glow)"/>

    <!-- The rising sun -->
    <circle cx="512" cy="660" r="190" fill="url(#sun)"/>

    <!-- Horizon line -->
    <rect x="0" y="660" width="1024" height="364" fill="#0a0e1a" opacity="0.55"/>
    <rect x="0" y="660" width="1024" height="6" fill="#ffb347" opacity="0.9"/>

    <!-- Reflected light on the dark foreground -->
    <rect x="0" y="666" width="1024" height="358" fill="url(#sky)" opacity="0.35"/>
  </g>
</svg>
