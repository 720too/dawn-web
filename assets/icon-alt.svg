<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="DAWN alternative app icon">
  <defs>
    <linearGradient id="skyA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#1a2040"/>
      <stop offset="100%" stop-color="#2a2347"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffd700"/>
      <stop offset="50%"  stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b4f"/>
    </linearGradient>
    <radialGradient id="sunA" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff6d8"/>
      <stop offset="55%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </radialGradient>
    <clipPath id="roundA">
      <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundA)">
    <rect width="1024" height="1024" fill="url(#skyA)"/>

    <!-- Concentric dawn arcs rising from the bottom -->
    <g fill="none" stroke-linecap="round">
      <path d="M 152 760 A 360 360 0 0 1 872 760" stroke="url(#arc)" stroke-width="26" opacity="0.95"/>
      <path d="M 232 760 A 280 280 0 0 1 792 760" stroke="url(#arc)" stroke-width="22" opacity="0.6"/>
      <path d="M 312 760 A 200 200 0 0 1 712 760" stroke="url(#arc)" stroke-width="18" opacity="0.35"/>
    </g>

    <!-- Sun -->
    <circle cx="512" cy="760" r="118" fill="url(#sunA)"/>

    <!-- Horizon baseline -->
    <rect x="120" y="760" width="784" height="7" rx="3.5" fill="#ffb347" opacity="0.85"/>
  </g>
</svg>
